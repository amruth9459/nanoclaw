# NanoClaw Container Egress Firewall Anchor
# For use with Apple Container (native macOS).
#
# On macOS with Docker Desktop, containers run inside a Linux VM so these host-level
# pf rules target the VM as a whole, not individual containers. For Docker, use
# the --network flag (setup-egress.sh creates a nanoclaw-restricted network).
#
# This file is auto-loaded by com.nanoclaw.egress.plist on boot.
# Allowed IPs are refreshed by setup-egress.sh -- re-run it when api.anthropic.com IPs change.

# Container subnets (Apple Container uses vmnet; Docker Desktop uses 172.17/192.168.65)
table <nanoclaw_containers> const { 192.168.64.0/24, 192.168.65.0/24, 172.17.0.0/16 }

# Allowed egress destinations -- refreshed by setup-egress.sh
# Placeholder; setup-egress.sh will replace this block with resolved IPs
table <nanoclaw_allowed_egress> persist

# Allow DNS (required for api.anthropic.com resolution)
pass out quick proto { tcp udp } from <nanoclaw_containers> to any port 53

# Allow outbound to api.anthropic.com only
pass out quick proto tcp from <nanoclaw_containers> to <nanoclaw_allowed_egress> port { 80 443 }

# Block all other outbound traffic from container subnets
block drop out quick from <nanoclaw_containers> to any

# Allow inbound return traffic (stateful -- not needed with 'pass out', but explicit)
pass in quick from <nanoclaw_allowed_egress> to <nanoclaw_containers>
